name: Grist vers JSON

on:
  schedule:
    - cron: '0 * * * *' # Toutes les heures
  workflow_dispatch:    # Permet de lancer à la main

# Ajout des permissions pour permettre le push
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer requests
        run: pip install requests

      - name: Generer le JSON
        env:
          GRIST_API_KEY: ${{ secrets.GRIST_API_KEY }}
        run: python .github/workflows/grist_to_json.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add horaires.json
          git diff --staged --quiet || git commit -m "maj horaires [skip ci]"
          git push
